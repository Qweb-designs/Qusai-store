<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Vases | Premium Florist NYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rose: #d4a373; --sage: #a8b5a2; --cream: #fefae0; --dark: #1b1b1b; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--cream); color: var(--dark); line-height: 1.6; }
        
        /* Hero Section */
        header { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }

        h1 { font-size: 4rem; margin: 0; font-family: 'Playfair Display', serif; color: var(--cream); }
        .btn { 
            padding: 15px 40px; background: var(--rose); color: white; text-decoration: none; 
            border-radius: 5px; transition: 0.4s; font-weight: bold; margin-top: 25px; border: none; cursor: pointer;
        }
        .btn:hover { background: var(--dark); letter-spacing: 2px; }

        /* Products */
        .section-title { padding: 50px 0 20px; font-size: 2.5rem; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; text-align: center; padding-bottom: 20px; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        
        .price { color: var(--rose); font-size: 1.5rem; font-weight: bold; }
        footer { background: var(--dark); color: white; padding: 40px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>Velvet Vases</h1>
        <p>Handcrafted Elegance for Every Occasion</p>
        <button class="btn" onclick="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})">Explore Collection</button>
    </header>

    <h2 class="section-title" id="shop">Our Signature Bestsellers</h2>
    
    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1561181286-d3fee7d55364?auto=format&fit=crop&w=600&q=80" alt="White Roses">
            <h3>Midnight Jasmine</h3>
            <p class="price">$120.00</p>
            <button class="btn" onclick="window.location.href='https://wa.me/123456789'">Order via WhatsApp</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1527061011665-3652c757a4d4?auto=format&fit=crop&w=600&q=80" alt="Peonies">
            <h3>Sunset Peonies</h3>
            <p class="price">$95.00</p>
            <button class="btn" onclick="window.location.href='https://wa.me/123456789'">Order via WhatsApp</button>
        </div>
    </div>

    <footer>
        <p>Velvet Vases NYC - Luxury Floral Design</p>
        <p>Created by Qweb-designs</p>
    </footer>

</body>
</html>
